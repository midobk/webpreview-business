<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Title pattern: {Business} — {what/where}. For demos add the robots meta below. -->
  <title>REPLACE — Business Name</title>
  <meta name="description" content="REPLACE — one specific sentence: what, who for, where." />
  <!-- Demo/preview pages only: <meta name="robots" content="noindex,nofollow" /> -->
  <style>
    /* ============ RESET ============ */
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { margin: 0; -webkit-font-smoothing: antialiased; }
    img { display: block; max-width: 100%; }
    button, input, select, textarea { font: inherit; }
    a { color: inherit; text-decoration: none; }

    /* ============ TOKENS ============
       PASTE the chosen direction's :root block from references/design-directions.md here,
       replacing this placeholder set. Zero hex values are allowed below this block. */
    :root {
      --paper: #f7f5f1;
      --white: #fffdfb;
      --ink: #1a1917;
      --muted: #635d56;
      --accent: #55423d;      /* replace with direction accent */
      --accent-deep: #3c2d29;
      --line: rgba(26, 25, 23, 0.14);
      --shadow: 0 24px 60px rgba(26, 25, 23, 0.14);
      --radius: 14px;
      /* spacing scale — the only vertical values used anywhere */
      --s1: 8px; --s2: 16px; --s3: 24px; --s4: 40px; --s5: 64px; --s6: 96px;
    }

    /* ============ BASE ============ */
    body {
      background: var(--paper);
      color: var(--ink);
      /* text face — replace per direction */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 17px;
      line-height: 1.7;
    }
    .display {
      /* display face — replace per direction (family, weight, tracking) */
      font-family: Georgia, "Iowan Old Style", serif;
      font-weight: 400;
      line-height: 1.02;
      letter-spacing: -0.04em;
    }
    h1, h2, h3 { margin: 0; }
    p { margin: 0; }

    /* ============ UTILITIES ============ */
    .container { width: min(1180px, calc(100% - 48px)); margin-inline: auto; }
    .section { padding-block: clamp(64px, 9vw, 120px); }

    .eyebrow {
      display: inline-flex; align-items: center; gap: 11px;
      color: var(--accent);
      font-size: 11px; font-weight: 800;
      letter-spacing: 0.17em; text-transform: uppercase;
    }
    .eyebrow::before { content: ""; width: 32px; height: 1px; background: currentColor; }

    .section-head { max-width: 720px; margin-bottom: var(--s5); }
    .section-head h2 {
      margin: var(--s2) 0;
      font-size: clamp(34px, 4.5vw, 60px);
    }
    .section-head h2 em { color: var(--accent); font-style: italic; }
    .section-head .lede { color: var(--muted); max-width: 560px; }

    .btn {
      border: 0; cursor: pointer;
      min-height: 46px; padding: 0 24px;
      display: inline-flex; align-items: center; justify-content: center; gap: 9px;
      border-radius: 999px; /* or var(--radius) per direction */
      font-size: 12px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary { background: var(--accent); color: var(--white); box-shadow: var(--shadow); }
    .btn-primary:hover { background: var(--accent-deep); }
    .btn-ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }

    /* accessibility floor — keep these */
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    /* ============ SECTIONS (build top to bottom, per page-anatomy.md) ============ */
  </style>
</head>
<body>
  <!-- Assembly order (book/call/quote job — adjust per page-anatomy.md § composition):
       [ribbon?] → nav (sticky) → hero (archetype A/B/C) → proof strip → services →
       SIGNATURE MOMENT → gallery/menu → about → CTA band → contact+hours → footer.
       Every section: <section class="section" style-varied background> <div class="container"> …
       Adjacent sections never share a background token. -->
</body>
</html>
