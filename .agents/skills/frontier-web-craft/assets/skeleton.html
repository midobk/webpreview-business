<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Title pattern: {Business} — {what/where}. For demos add the robots meta below. -->
  <title>REPLACE — Business Name</title>
  <meta name="description" content="REPLACE — one specific sentence: what, who for, where." />
  <!-- Demo/preview pages only: <meta name="robots" content="noindex,nofollow" /> -->
  <style>
    /* ============ RESET (keep) ============ */
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { margin: 0; -webkit-font-smoothing: antialiased; }
    img { display: block; max-width: 100%; }
    button, input, select, textarea { font: inherit; }
    a { color: inherit; text-decoration: none; }

    /* ============ TOKENS ============
       skeleton-sentinel: this palette is DELIBERATELY unshippable gray. The checker fails
       any page that still contains the word "skeleton-sentinel" — replace this whole block
       with the chosen direction's :root from references/design-directions.md, then delete
       this comment. Zero hex is allowed below this block. */
    :root {
      --paper: #ececea;
      --white: #f4f4f2;
      --ink: #3b3b39;
      --muted: #777773;
      --accent: #8a8a85;
      --accent-deep: #6e6e69;
      --line: rgba(59, 59, 57, 0.16);
      --shadow: 0 20px 50px rgba(59, 59, 57, 0.12);
      --radius: 8px;
      /* spacing scale — the only vertical values used anywhere */
      --s1: 8px; --s2: 16px; --s3: 24px; --s4: 40px; --s5: 64px; --s6: 96px;
    }

    /* ============ BASE ============
       Both font stacks come from the direction (conservative or expressive tier) —
       these system defaults are placeholders, not choices. */
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 17px;
      line-height: 1.7;
    }
    .display {
      font-family: serif; /* ← direction display stack + weight + tracking */
      line-height: 1.02;
    }
    h1, h2, h3 { margin: 0; }
    p { margin: 0; }

    /* ============ STRUCTURAL FLOOR (keep — these have no look) ============ */
    .container { width: min(1180px, calc(100% - 48px)); margin-inline: auto; }
    .section { padding-block: clamp(64px, 9vw, 120px); }

    /* ============ VISIBLE DEVICES — CHOSEN, NOT INHERITED ============
       Eyebrow, buttons, section-head treatment, heading accent: pick each from
       references/page-anatomy.md § Device menu, per the direction and per the site.
       Nothing here ships a shape on purpose — if your finished page's eyebrow, button,
       or head treatment could have come from a sibling site, you skipped the choice. */
    .eyebrow { /* choose a variant: leading rule · boxed tag · index number · plain tracked caps · dot marker */ }
    .btn {
      /* structural minimum only — shape, case, tracking, hover come from the device menu */
      border: 0; cursor: pointer;
      min-height: 48px; padding: 0 24px;
      display: inline-flex; align-items: center; justify-content: center; gap: 9px;
    }
    .section-head { max-width: 720px; margin-bottom: var(--s5); }
    .section-head h2 { font-size: clamp(34px, 4.5vw, 60px); }

    /* accessibility floor — keep */
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    /* ============ SECTIONS (build per your design plan) ============ */
  </style>
</head>
<body>
  <!-- Assembly: follow YOUR design plan (direction · conceit · signature · thesis) and the
       composition menus in references/page-anatomy.md — section order, nav pattern (standard /
       masthead / minimal), hero archetype (A / B / C), and ribbon-or-not are all choices made
       there, not defaults inherited here. Adjacent sections never share a background token. -->
</body>
</html>
